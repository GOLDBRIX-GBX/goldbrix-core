name: Bug report
description: Report a problem with GoldBrix Core
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please describe the issue precisely, including steps to reproduce it.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: GoldBrix Core version
      description: Output of `goldbrixd -version`.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Operating system, hardware, and other relevant details.
